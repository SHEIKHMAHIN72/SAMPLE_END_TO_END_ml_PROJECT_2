<!DOCTYPE html>
<html lang="en">
<head>

<title>Prediction Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(120deg,#84fab0,#8fd3f4);
font-family:Segoe UI;
}

.form-card{

background:white;
padding:40px;
border-radius:15px;
box-shadow:0px 8px 25px rgba(0,0,0,0.2);

}

.result-box{

background:#e8f5e9;
border-left:6px solid green;
padding:15px;
margin-top:20px;
font-size:22px;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-7 form-card">

<h2 class="text-center mb-4">
Student Exam Performance Predictor
</h2>


<form action="{{ url_for('predict_datapoint')}}" method="post">

<label>Gender</label>
<select class="form-control mb-3" name="gender" required>
<option disabled selected>Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>


<label>Race / Ethnicity</label>
<select class="form-control mb-3" name="ethnicity" required>
<option disabled selected>Select Group</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>


<label>Parental Education</label>
<select class="form-control mb-3" name="parental_level_of_education" required>
<option disabled selected>Select Education</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="master's degree">Master's Degree</option>
<option value="high school">High School</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>


<label>Lunch Type</label>
<select class="form-control mb-3" name="lunch" required>
<option disabled selected>Select Lunch</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>


<label>Test Preparation Course</label>
<select class="form-control mb-3" name="test_preparation_course" required>
<option disabled selected>Select Course</option>
<option value="completed">Completed</option>
<option value="none">None</option>
</select>


<label>Reading Score</label>
<input class="form-control mb-3" type="number" name="reading_score" min="0" max="100">


<label>Writing Score</label>
<input class="form-control mb-3" type="number" name="writing_score" min="0" max="100">


<button class="btn btn-success w-100">
Predict Maths Score
</button>

</form>


{% if results %}

<div class="result-box text-center">

Predicted Maths Score = {{results}}

</div>

{% endif %}


</div>

</div>

</div>

</body>
</html>
